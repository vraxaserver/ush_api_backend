# docker-compose.yml
# Run: docker-compose up -d --build
# Note: Requires external PostgreSQL database configured in .env file
# Note: Async task queues handled by AWS SQS (no local Redis/Celery workers needed)

services:
  # ==========================================================================
  # Django Web Application
  # ==========================================================================
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: spaush_web
    restart: unless-stopped
    command: >
      sh -c "
        python manage.py migrate &&
        python manage.py collectstatic --noinput &&
        gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 4 --threads 2 --access-logfile - --error-logfile -
      "
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - CACHE_REDIS_URL=${CACHE_REDIS_URL:-redis://redis:6379/1}
    depends_on:
      - redis
    volumes:
      - /home/ubuntu/staticfiles:/app/staticfiles
      - /home/ubuntu/mediafiles:/app/mediafiles
      - ./logs:/app/logs
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/api/v1/auth/health/" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - spaush_network

# ==========================================================================
# Redis (Cache & Throttling)
# ==========================================================================
  redis:
    image: redis:7-alpine
    container_name: spaush_redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    networks:
      - spaush_network

# ==========================================================================
# Volumes
# ==========================================================================
volumes:
  redis_data:

# ==========================================================================
# Networks
# ==========================================================================
networks:
  spaush_network:
    driver: bridge
