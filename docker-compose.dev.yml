# docker-compose.dev.yml
# Development configuration with hot-reload
# Run: docker-compose -f docker-compose.dev.yml up --build
# Note: Requires external PostgreSQL database configured in .env file
# Note: Async task queues handled by AWS SQS (no local Redis/Celery workers needed)

services:
  # ==========================================================================
  # Django Web Application (Development)
  # ==========================================================================
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: spaush_web_dev
    command: >
      sh -c "
        python manage.py setup_groups &&
        python manage.py runserver 0.0.0.0:8000
      "
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DEBUG=True
    volumes:
      # Mount source code for hot-reload
      - .:/app
      - /app/__pycache__
    networks:
      - spaush_network_dev

networks:
  spaush_network_dev:
    driver: bridge
